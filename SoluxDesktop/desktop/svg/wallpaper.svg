<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="960" cy="540" r="350" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="250" cy="180" r="80" fill="#ffffff" opacity="0.08"/>
  <circle cx="1650" cy="850" r="120" fill="#ffffff" opacity="0.06"/>
  <circle cx="1450" cy="250" r="50" fill="#ffffff" opacity="0.1"/>

  <!-- Solux logo -->
  <g transform="translate(960 470)">
    <circle r="120" fill="none" stroke="#ffffff" stroke-width="16"/>
    <circle r="70" fill="none" stroke="#7dd3fc" stroke-width="12"/>
    <circle r="25" fill="#ffffff"/>
  </g>

  <!-- Text -->
  <text x="960" y="700"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="96"
        font-weight="bold"
        fill="#ffffff">
    SOLUX
  </text>

  <text x="960" y="760"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="32"
        fill="#dbeafe"
        opacity="0.9">
    A Modern Experience
  </text>
</svg>
