<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Wallpaper Example</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Reference your SVG file path here */
            background-image: url('wallpaper.svg'); 
            /* Ensures the wallpaper covers the entire screen */
            background-size: cover; 
            /* Centers the wallpaper image */
            background-position: center; 
            /* Prevents the image from repeating */
            background-repeat: no-repeat; 
            /* Keeps the background fixed while scrolling */
            background-attachment: fixed; 
        }
    </style>
</head>
<body>
</body>
</html>
